<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Eyeball -->
  <ellipse cx="50" cy="50" rx="45" ry="32" fill="#1a1a2e" stroke="#e0e0e0" stroke-width="3"/>
  <!-- Iris - half blue half red -->
  <circle cx="50" cy="50" r="18" fill="#3b82f6"/>
  <path d="M50 32 A18 18 0 0 1 50 68" fill="#ef4444"/>
  <!-- Pupil -->
  <circle cx="50" cy="50" r="8" fill="#0f1117"/>
  <!-- Glint -->
  <circle cx="44" cy="44" r="4" fill="white" opacity="0.7"/>
  <!-- Eyebrow raised suspiciously -->
  <path d="M10 22 Q30 4 55 10 Q75 14 90 22" fill="none" stroke="#e0e0e0" stroke-width="4" stroke-linecap="round"/>
</svg>
